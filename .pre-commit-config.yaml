repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 9.0.0a3
    hooks:
      - id: isort

  - repo: https://github.com/jsh9/pydoclint
    rev: 0.9.1
    hooks:
      - id: pydoclint
        args: ["--style", "numpy"]
        # The distributed/ multi-GPU subpackage is evolving research code; the
        # strict docstring<->signature checks are exempted here (black/isort
        # still apply). Tighten and re-enable once the API stabilises.
        exclude: '^yggdrax/distributed/'

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        # Run from the active environment so it sees the installed jax/jaxtyping
        # stubs. Config + baseline live in pyproject.toml / .basedpyright/.
        entry: basedpyright
        language: system
        types: [python]
        pass_filenames: false
        # The full project is analysed regardless of which files changed, so a
        # new error anywhere is caught even when an unrelated file is committed.
        args: ["yggdrax"]
