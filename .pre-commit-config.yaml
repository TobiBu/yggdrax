repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 9.0.0b1
    hooks:
      - id: isort

  - repo: https://github.com/jsh9/pydoclint
    rev: 0.9.1
    hooks:
      - id: pydoclint
        args: ["--style", "numpy"]
        # The distributed/ multi-GPU subpackage is evolving research code; the
        # strict docstring<->signature checks are exempted here (black/isort
        # still apply). Tighten and re-enable once the API stabilises.
        exclude: '^yggdrax/distributed/'

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        # Runs from the active environment so it sees the installed
        # jax/jaxtyping stubs (config + baseline live in pyproject.toml /
        # .basedpyright/). If basedpyright is not on PATH (e.g. the dev env is
        # not activated) the check is skipped locally with a message rather than
        # hard-failing the commit; CI installs ".[dev]" and enforces it there.
        entry: "bash -c 'command -v basedpyright >/dev/null 2>&1 && exec basedpyright yggdrax || echo \"[pre-commit] basedpyright not on PATH; skipped locally (enforced in CI). Activate your env or run: pip install -e .[dev]\"'"
        language: system
        types: [python]
        pass_filenames: false
