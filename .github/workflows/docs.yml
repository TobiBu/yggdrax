name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege token, plus the Pages deploy permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + docs toolchain
        # jax is pinned to match the version the docs are validated against
        # (autodoc imports the package); sphinx/furo/myst come from ".[docs]".
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]" "jax==0.8.3" "jaxlib==0.8.3"

      - name: Build HTML
        run: |
          python -m sphinx -b html docs docs/_build/html
          touch docs/_build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # Publish only for main (post-merge) or a manual run; PRs build without
  # deploying so doc breakage is caught without touching the live site.
  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
